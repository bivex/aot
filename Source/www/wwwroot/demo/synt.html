		<!-- Demo card -->

				<div class="field">
					<label for="InputText">Input your text:</label>
					<div class="ui demo textarea">
						<textarea 
							id="InputText" 
							name="InputText" 
							placeholder="Введите текст для анализа синтаксиса..."

						></textarea>
					</div>
				</div>
				
				<div class="field">
					<label for="Language">Язык / Language:</label>
					<select id="Language" name="Language" class="ui fluid dropdown">
						<option value="Russian" selected>Русский (Russian)</option>
						<option value="German">Deutsch (German)</option>
						<option value="Ukrainian">Українська (Ukrainian)</option>
					</select>
				</div>
				
				<button type="button" class="ui primary button" onclick="window.syntax_request()" aria-label="Отправить запрос на анализ">
					Submit Request
				</button>
			</form>
			
		<!-- Canvas output -->
		<div class="ui canvas segment" id="canvasWrapper" role="region" aria-label="Результат синтаксического анализа">
			<canvas id="synanCanvas"></canvas>
		</div>
