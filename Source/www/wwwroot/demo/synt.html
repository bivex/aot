	<!-- Fixed navigation -->
	<nav class="ui fixed menu aot-nav" role="navigation" aria-label="Основное меню">
		<div class="ui container">
			<a href="/index.html" class="item">Главная</a>
			<a href="/history.html" class="item">О нас</a>
			<a href="/product.html" class="item">Продукты</a>

			<a href="/onlinedemo.html" class="item active">Демо</a>
			<a href="/technology.html" class="item">Технологии</a>
			<div class="right menu">
				<a href="#top" class="item" title="Наверх" aria-label="Наверх">↑</a>
			</div>
		</div>
	</nav>
	
	<!-- Hero header -->
	<header class="ui hero header" id="top" role="banner">
		<div class="ui container">
			<h1>АОТ</h1>
			<p class="subtitle">Автоматическая Обработка Текста</p>
		</div>
	</header>
	
	<!-- Main content -->
	<main id="main-content" class="ui main container" role="main">
		
		<!-- Demo card -->
		<section class="ui demo card aot-card" aria-labelledby="demo-title">
			<h2 id="demo-title" class="header">Синтаксический анализ</h2>
			
			<form class="ui form" id="syntax-form" autocomplete="off">
				<div class="field">
					<label for="InputText">Ввод текста:</label>
					<div class="ui demo textarea">
						<textarea 
							id="InputText" 
							name="InputText" 
							placeholder="Введите текст для анализа синтаксиса..."
							aria-label="Текст для синтаксического анализа"
							rows="6"
						></textarea>
					</div>
				</div>
				
				<div class="field">
					<label for="Language">Язык / Language:</label>
 					<select id="Language" name="Language" class="ui fluid dropdown">
 						<option value="Russian" selected>Русский (Russian)</option>
 						<option value="German">Deutsch (German)</option>
 						<option value="English">English</option>
 						<option value="Ukrainian">Українська (Ukrainian)</option>
 					</select>
				</div>
				
				<div class="field">
					<button type="button" class="ui primary button aot-primary" onclick="window.syntax_request()" aria-label="Отправить запрос на анализ">
						Submit Request
					</button>
					<button type="button" class="ui button" onclick="clearForm()" aria-label="Очистить форму">
						Clear
					</button>
				</div>
			</form>
			
			<!-- Canvas output -->
			<div class="ui canvas segment" id="canvasWrapper" role="region" aria-live="polite" aria-label="Результат синтаксического анализа">
				<canvas id="synanCanvas"></canvas>
			</div>
		</section>
		
		<!-- Info section -->
		<section class="ui info segment" aria-labelledby="info-title">
			<h3 id="info-title" class="ui header">О модуле синтаксис</h3>
			<p>Краткое описание <a href="/demo/rus_syn_consts.html">констант русского синтаксиса</a>.</p>
		</section>
		
	</main>
	
	<!-- Footer -->
	<footer class="ui footer segment" role="contentinfo">
		<div class="ui container">
			<p>
				Разработка <a href="mailto:simple@mosk.ru">DiP</a>.

			<a href="#top" class="ui" title="Наверх" aria-label="Наверх">↑ Наверх</a>
		</div>
	</footer>
	
	<!-- Scripts -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.3/dist/semantic.min.js"></script>
  <script src="synan.js?v=18"></script>
	
	<!-- Initialize components -->
	<script>
		$(document).ready(function() {
			$('#Language').dropdown();
		});
		
		function clearForm() {
			$('#InputText').val('');
			$('#canvasWrapper').empty().append('<canvas id="synanCanvas"></canvas>');
			if (window.reinitCanvas) window.reinitCanvas();
		}
	</script>
</body>
</html>
