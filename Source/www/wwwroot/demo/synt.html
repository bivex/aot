				<div class="language-select">
					<label for="Language">Язык / Language:</label>
					<select id="Language" name="Language">
						<option value="Russian" selected>Русский (Russian)</option>
						<option value="German">Deutsch (German)</option>
						<option value="Ukrainian">Українська (Ukrainian)</option>
					</select>
				</div>
				<div class="textarea-wrapper">
					<textarea 
						id="InputText" 
						name="InputText" 
						rows="10" 
						cols="55" 
						placeholder="Введите текст для анализа синтаксиса..."
						aria-label="Текст для синтаксического анализа"
					></textarea>
				</div>
				<button type="button" class="submit-btn" onclick="window.syntax_request()" aria-label="Отправить запрос на анализ">

				</button>
			</div>

			<div class="canvas-wrapper" id="canvasWrapper" role="region" aria-label="Результат синтаксического анализа">
